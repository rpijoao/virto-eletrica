<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Virto Elétrica</title>
  <meta name="description" content="Acesse sua conta na Virto Elétrica. Área restrita para clientes e colaboradores." />
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Vite entry point -->
  <script type="module" src="/src/js/login.js"></script>
</head>
<body>

  <main class="login-page">

    <!-- Partículas decorativas -->
    <div class="login-particle"></div>
    <div class="login-particle"></div>
    <div class="login-particle"></div>
    <div class="login-grid-bg"></div>

    <div class="login-container">

      <!-- Card principal -->
      <div class="login-card">

        <!-- Header -->
        <div class="login-header">
          <a href="/">
            <img src="/img/logo-virto-eletrica.svg" alt="Virto Elétrica" class="login-logo" />
          </a>
          <h1 class="login-title">Acesse sua conta</h1>
          <p class="login-subtitle">Área restrita Virto Elétrica</p>
        </div>

        <!-- Caixa de erro -->
        <div class="login-error" id="loginError">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          <span id="loginErrorMsg"></span>
        </div>

        <!-- Formulário -->
        <form id="loginForm" class="login-form" autocomplete="on">

          <!-- E-mail -->
          <div class="input-group">
            <label for="loginEmail">E-mail</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="4" width="20" height="16" rx="2"/>
                  <path d="M22 4L12 13 2 4"/>
                </svg>
              </span>
              <input
                type="email"
                id="loginEmail"
                name="email"
                placeholder="seu@email.com"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <!-- Senha -->
          <div class="input-group">
            <label for="loginSenha">Senha</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="11" width="18" height="11" rx="2"/>
                  <path d="M7 11V7a5 5 0 0110 0v4"/>
                </svg>
              </span>
              <input
                type="password"
                id="loginSenha"
                name="password"
                placeholder="••••••••"
                autocomplete="current-password"
                required
                minlength="6"
              />
              <button type="button" class="toggle-password" id="toggleSenha" aria-label="Mostrar/ocultar senha">
                <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Opções -->
          <div class="login-options">
            <label class="remember-me">
              <input type="checkbox" id="rememberMe" />
              <span>Lembrar de mim</span>
            </label>
            <a href="#" class="forgot-link">Esqueceu a senha?</a>
          </div>

          <!-- Botão de login -->
          <button type="submit" class="login-btn" id="loginBtn">
            <span class="btn-text">Entrar</span>
            <span class="btn-spinner"></span>
          </button>

          <!-- Divider -->
          <div class="login-divider">
            <span>ou continue com</span>
          </div>

          <!-- Google -->
          <button type="button" class="google-btn" id="googleBtn">
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Entrar com Google
          </button>

        </form>

        <!-- Footer do card -->
        <div class="login-footer">
          <p class="login-footer-text">
            Não tem uma conta? <a href="#">Fale conosco</a>
          </p>
        </div>

      </div>

      <!-- Link para voltar -->
      <a href="/" class="login-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5"/>
          <path d="M12 19l-7-7 7-7"/>
        </svg>
        Voltar ao site
      </a>

    </div>

  </main>

</body>
</html>
